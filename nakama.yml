# Database Configuration
database:
  address:
    - "postgres.atojskxrxfsbpeefigtm:l6TuVaUiqmhWbbVO@aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require"
  conn_pool_max_size: 20
  conn_pool_min_size: 5

# Runtime Configuration
runtime:
  path: "/nakama/data/modules"
  js_entrypoint: "index.js"
  js_cache: true

# Socket Configuration
socket:
  server_key: "DaNjI20sbHAZBy3h86xCoTfMleidWELw"
  port: 7350
  max_message_size_bytes: 4096

# HTTP Configuration
http:
  port: 7350
  max_body_size: 3145728
  write_timeout_ms: 5000
  read_timeout_ms: 5000
  idle_timeout_ms: 60000

# Session Configuration
session:
  token_expiry_seconds: 7200
  refresh_token_expiry_seconds: 604800
  encryption_key: "DaNjI20sbHAZBy3h86xCoTfMleidWELw"
  refresh_encryption_key: "DaNjI20sbHAZBy3h86xCoTfMleidWELw"

# Console Configuration
console:
  username: "admin"
  password: "DaNjI20sbHAZBy3h86xCoTfMleidWELw"
  port: 7351
  allowed_origins:
    - "*"

# Logger Configuration
logger:
  level: "INFO"
  stdout: true
  file: "/nakama/data/logs/nakama.log"

# Metrics Configuration
metrics:
  port: 9102
  enabled: true

# Match Configuration
match:
  min: 1
  max: 64
  min_presence: 1
  max_presence: 64

# Leaderboard Configuration
leaderboard:
  cache_max_size: 10000
  cache_expiry_seconds: 60
  rank_cache_expiry_seconds: 60

# Tracker Configuration
tracker:
  max_presence: 100000
  max_events: 1000

# Pipeline Configuration
pipeline:
  max_batch_size: 100
  max_concurrent_rpcs: 100
